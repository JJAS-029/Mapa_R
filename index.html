<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Geográfico de Territorios</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #map { width: 100vw; height: calc(100vh - 60px); z-index: 1; background-color: #f0f0f0; } 
        
        #footer {
            width: 100vw; height: 60px; background-color: white; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.1); z-index: 1000; 
        }
        #footer img { max-height: 45px; }

        /* Etiquetas de Municipios */
        .etiqueta-municipio {
            background-color: transparent; border: transparent; box-shadow: none; font-weight: bold; font-size: 12px; color: #333; 
            text-shadow: 2px 2px 4px rgba(255,255,255,0.9), -2px -2px 4px rgba(255,255,255,0.9);
            pointer-events: none;
        }
        .ocultar-etiquetas .etiqueta-municipio { opacity: 0; visibility: hidden; transition: opacity 0.3s; }

        /* Login Overlay */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(30, 30, 30, 0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 30px; border-radius: 8px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .login-box input { padding: 10px; margin: 10px 0; width: 80%; border: 1px solid #ccc; border-radius: 4px; }
        .login-box button { padding: 10px 20px; background-color: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #error-msg { color: red; display: none; margin-top: 10px; font-size: 0.9em; }

        /* Botón Volver a Vista General */
        #btn-reset-vista {
            display: none; position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000;
            padding: 10px 20px; background-color: #2c3e50; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>Acceso al Sistema</h2>
            <input type="password" id="password-input" placeholder="Contraseña">
            <button onclick="verificarPassword()">Entrar</button>
            <p id="error-msg">Contraseña incorrecta.</p>
        </div>
    </div>

    <button id="btn-reset-vista" onclick="window.resetearVista()">Restablecer Vista</button>

    <div id="map"></div>

    <div id="footer">
        <img src="logo.jpg" alt="Logotipo">
    </div>

    <script src="app.js"></script>
</body>
</html>
